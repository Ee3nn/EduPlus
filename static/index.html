<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ManageIB | Personalized IB Schedule</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap">
    <style>
        :root {
            --indigo: oklch(0.40 0.12 260);
            --mint: oklch(0.85 0.12 160);
        }
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .font-mono { font-family: 'IBM Plex Mono', monospace; }
        .bg-indigo-custom { background-color: var(--indigo); }
        .text-indigo-custom { color: var(--indigo); }
        .border-indigo-custom { border-color: var(--indigo); }
        
        /* Dark mode defaults */
        .dark-theme { background-color: #000; color: #fff; }
        .light-theme { background-color: #f8fafc; color: #0f172a; }

        .glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        
        /* Hide scrollbar */
        ::-webkit-scrollbar { display: none; }
        
        .transition-theme { transition: background-color 0.5s ease, color 0.5s ease, border-color 0.5s ease; }
    </style>
</head>
<body class="dark-theme transition-theme min-h-screen">
    <!-- Navbar -->
    <nav id="navbar" class="sticky top-0 z-50 glass border-b border-white/5 px-6 py-4 flex items-center justify-between transition-theme bg-black/60">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-indigo-custom flex items-center justify-center text-white shadow-lg shadow-indigo-500/30">
                <span class="font-black text-lg">MI</span>
            </div>
            <div>
                <h1 class="text-lg font-bold">ManageIB</h1>
                <p class="text-[10px] uppercase tracking-widest text-indigo-400 font-bold">IB Student Portal</p>
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
                <span class="text-[10px] font-bold uppercase tracking-wider opacity-50">Size</span>
                <input type="range" id="fontSizeSlider" min="0.8" max="1.5" step="0.1" value="1" class="w-16 h-1.5 bg-indigo-500/20 rounded-lg appearance-none cursor-pointer accent-indigo-500">
            </div>
            <button id="themeToggle" class="p-2.5 rounded-full bg-white/5 hover:bg-white/10 active:scale-90 transition-all">
                <svg id="sunIcon" class="w-5 h-5 text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <svg id="moonIcon" class="hidden w-5 h-5 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-12 pb-44">
        <header class="mb-14">
            <h2 class="text-4xl font-extrabold tracking-tight mb-4 leading-tight">Build your ManageIB Schedule</h2>
            <p class="text-slate-500 text-lg">Transform institutional data into your personalized daily companion.</p>
        </header>

        <!-- Step 1: Homeroom Selection -->
        <section class="mb-12">
            <div class="flex items-center gap-2.5 text-indigo-500 mb-6">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <h3 class="text-sm font-bold uppercase tracking-[0.25em]">Step 1: Your Homeroom</h3>
            </div>
            <div id="homeroomContainer" class="relative p-1 rounded-2xl bg-white/5 border border-white/10 transition-theme">
                <select id="homeroomSelect" class="w-full appearance-none bg-transparent px-5 py-4 font-bold text-lg outline-none cursor-pointer">
                    <!-- Options injected via JS -->
                </select>
                <svg class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none opacity-40 w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
        </section>

        <!-- Step 2: Electives Grid -->
        <section>
            <div class="flex items-center gap-2.5 text-indigo-500 mb-6">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <h3 class="text-sm font-bold uppercase tracking-[0.25em]">Step 2: Choose Electives</h3>
            </div>
            <div id="electivesGrid" class="grid gap-8">
                <!-- Cards injected via JS -->
            </div>
        </section>

        <!-- Fixed Action Bar -->
        <div id="actionBar" class="fixed bottom-10 left-6 right-6 flex flex-col gap-3.5 max-w-lg mx-auto p-4.5 rounded-[2.8rem] glass border border-white/10 shadow-2xl bg-zinc-800/80 transition-theme">
            <button id="btnSaveImage" class="w-full h-16 bg-indigo-custom hover:brightness-110 active:scale-[0.98] text-white font-bold rounded-2xl flex items-center justify-center gap-3.5 transition-all shadow-lg shadow-indigo-500/20">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                Save to Photos
            </button>
            <button id="btnCalendar" class="w-full h-15 font-bold rounded-2xl flex items-center justify-center gap-3 border border-white/10 bg-white/5 hover:bg-white/10 transition-all active:scale-[0.98] transition-theme">
                <svg class="w-5 h-5 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Add to Calendar
            </button>
        </div>

        <canvas id="exportCanvas" style="display: none;"></canvas>
    </main>

    <footer class="text-center py-28 opacity-30 transition-theme">
        <p class="text-[10px] uppercase tracking-[0.5em] font-black italic">Accuracy Protocol Active · Ver 2.5 (HTML)</p>
    </footer>

    <script>
        const TIMETABLE_DATA = {
            "timetable": {
                "class": "IB Grade 10 Class 8",
                "schedule": [
                    { "day": "Monday", "periods": [
                        { "period": "1", "time": "8:00 - 8:40", "options": [{ "subject": "IB Lit", "room": null }, { "subject": "IB L&L", "room": null }] },
                        { "period": "2", "time": "8:45 - 9:25", "options": [{ "subject": "IB Chem1", "room": null }, { "subject": "IB Bio1", "room": null }, { "subject": "IB Phy1", "room": null }] },
                        { "period": "3", "time": "9:35 - 10:15", "options": [{ "subject": "IB Math", "room": null }] },
                        { "period": "4", "time": "10:20 - 11:00", "options": [{ "subject": "Nat 信息技术", "room": null }] },
                        { "period": "5", "time": "11:05 - 11:55", "options": [{ "subject": "Lunch", "room": null }] },
                        { "period": "Lunch Period", "time": "12:00 - 12:40", "options": [{ "subject": "IB Chem2", "room": null }, { "subject": "IB Bio2", "room": null }, { "subject": "IB Phy2", "room": null }] },
                        { "period": "6", "time": "12:45 - 13:25", "options": [{ "subject": "IB EngB", "room": null }] },
                        { "period": "7", "time": "13:30 - 14:10", "options": [{ "subject": "None", "room": null }] },
                        { "period": "8", "time": "14:15 - 14:55", "options": [{ "subject": "Nat 化学", "room": null }, { "subject": "Nat 物理", "room": null }, { "subject": "Nat 生物", "room": null }] },
                        { "period": "9", "time": "15:00 - 15:40", "options": [{ "subject": "Nat 化学", "room": null }, { "subject": "Nat 物理", "room": null }, { "subject": "Nat 生物", "room": null }] },
                        { "period": "10", "time": "15:45 - 16:25", "options": [{ "subject": "IB CS1", "room": null }, { "subject": "IB Bus1", "room": null }, { "subject": "IB Geo1", "room": null }] }
                    ]},
                    { "day": "Tuesday", "periods": [
                        { "period": "1", "time": "8:00 - 8:40", "options": [{ "subject": "None", "room": null }] },
                        { "period": "2", "time": "8:45 - 9:25", "options": [{ "subject": "Nat 心理健康", "room": null }] },
                        { "period": "3", "time": "9:35 - 10:15", "options": [{ "subject": "IB Econ1", "room": null }, { "subject": "IB Phi1", "room": null }, { "subject": "IB VA1", "room": null }] },
                        { "period": "4", "time": "10:20 - 11:00", "options": [{ "subject": "IB Econ1", "room": null }, { "subject": "IB Phi1", "room": null }, { "subject": "IB VA1", "room": null }] },
                        { "period": "5", "time": "11:05 - 11:55", "options": [{ "subject": "IB Chem1", "room": null }, { "subject": "IB Bio1", "room": null }, { "subject": "IB Phy1", "room": null }] },
                        { "period": "Lunch Period", "time": "12:00 - 12:40", "options": [{ "subject": "Lunch", "room": null }] },
                        { "period": "6", "time": "12:45 - 13:25", "options": [{ "subject": "IB EngB", "room": null }] },
                        { "period": "7", "time": "13:30 - 14:10", "options": [{ "subject": "IB CS1", "room": null }, { "subject": "IB Bus1", "room": null }, { "subject": "IB Geo1", "room": null }] },
                        { "period": "8", "time": "14:15 - 14:55", "options": [{ "subject": "PE", "room": null }] },
                        { "period": "9", "time": "15:00 - 15:40", "options": [{ "subject": "IB Math", "room": null }] },
                        { "period": "10", "time": "15:45 - 16:25", "options": [{ "subject": "None", "room": null }] }
                    ]},
                    { "day": "Wednesday", "periods": [
                        { "period": "1", "time": "8:00 - 8:40", "options": [{ "subject": "IB Chem1", "room": null }, { "subject": "IB Bio1", "room": null }, { "subject": "IB Phy1", "room": null }] },
                        { "period": "2", "time": "8:45 - 9:25", "options": [{ "subject": "IB EngB", "room": null }] },
                        { "period": "3", "time": "9:35 - 10:15", "options": [{ "subject": "IB Geo2", "room": null }, { "subject": "IB Bus2", "room": null }, { "subject": "IB His2", "room": null }] },
                        { "period": "4", "time": "10:20 - 11:00", "options": [{ "subject": "IB VA2", "room": null }, { "subject": "IB Mus2", "room": null }, { "subject": "IB Econ2", "room": null }] },
                        { "period": "5", "time": "11:05 - 11:55", "options": [{ "subject": "None", "room": null }] },
                        { "period": "Lunch Period", "time": "12:00 - 12:40", "options": [{ "subject": "Lunch", "room": null }] },
                        { "period": "6", "time": "12:45 - 13:25", "options": [{ "subject": "IB Chem2", "room": null }, { "subject": "IB Bio2", "room": null }, { "subject": "IB Phy2", "room": null }] },
                        { "period": "7", "time": "13:30 - 14:10", "options": [{ "subject": "PD", "room": null }] },
                        { "period": "8", "time": "14:15 - 14:55", "options": [{ "subject": "None", "room": null }] },
                        { "period": "9", "time": "15:00 - 15:40", "options": [{ "subject": "IB Math", "room": null }] },
                        { "period": "10", "time": "15:45 - 16:25", "options": [{ "subject": "Nat 语文", "room": null }] }
                    ]},
                    { "day": "Thursday", "periods": [
                        { "period": "1", "time": "8:00 - 8:40", "options": [{ "subject": "IB EngB", "room": null }] },
                        { "period": "2", "time": "8:45 - 9:25", "options": [{ "subject": "IB EngB", "room": null }] },
                        { "period": "3", "time": "9:35 - 10:15", "options": [{ "subject": "IB Chem1", "room": null }, { "subject": "IB Bio1", "room": null }, { "subject": "IB Phy1", "room": null }] },
                        { "period": "4", "time": "10:20 - 11:00", "options": [{ "subject": "Nat 艺术", "room": null }] },
                        { "period": "5", "time": "11:05 - 11:55", "options": [{ "subject": "IB Lit", "room": null }, { "subject": "IB L&L", "room": null }] },
                        { "period": "Lunch Period", "time": "12:00 - 12:40", "options": [{ "subject": "Lunch", "room": null }] },
                        { "period": "6", "time": "12:45 - 13:25", "options": [{ "subject": "IB Chem2", "room": null }, { "subject": "IB Bio2", "room": null }, { "subject": "IB Phy2", "room": null }] },
                        { "period": "7", "time": "13:30 - 14:10", "options": [{ "subject": "Nat 思政", "room": null }] },
                        { "period": "8", "time": "14:15 - 14:55", "options": [{ "subject": "PE", "room": null }] },
                        { "period": "9", "time": "15:00 - 15:40", "options": [{ "subject": "IB Math", "room": null }] },
                        { "period": "10", "time": "15:45 - 16:25", "options": [{ "subject": "None", "room": null }] }
                    ]},
                    { "day": "Friday", "periods": [
                        { "period": "1", "time": "8:00 - 8:40", "options": [{ "subject": "Nat 语文", "room": null }] },
                        { "period": "2", "time": "8:45 - 9:25", "options": [{ "subject": "IB Geo2", "room": null }, { "subject": "IB Bus2", "room": null }, { "subject": "IB His2", "room": null }] },
                        { "period": "3", "time": "9:35 - 10:15", "options": [{ "subject": "Nat 地理", "room": null }] },
                        { "period": "4", "time": "10:20 - 11:00", "options": [{ "subject": "CW", "room": null }, { "subject": "JP", "room": null }, { "subject": "IC", "room": null }, { "subject": "Linguistics", "room": null }] },
                        { "period": "5", "time": "11:05 - 11:55", "options": [{ "subject": "None", "room": null }] },
                        { "period": "Lunch Period", "time": "12:00 - 12:40", "options": [{ "subject": "Lunch", "room": null }] },
                        { "period": "6", "time": "12:45 - 13:25", "options": [{ "subject": "IB Chem2", "room": null }, { "subject": "IB Bio2", "room": null }, { "subject": "IB Phy2", "room": null }] },
                        { "period": "7", "time": "13:30 - 14:10", "options": [{ "subject": "Class Meeting", "room": null }] },
                        { "period": "8", "time": "14:15 - 14:55", "options": [{ "subject": "None", "room": null }] },
                        { "period": "9", "time": "15:00 - 15:40", "options": [{ "subject": "None", "room": null }] },
                        { "period": "10", "time": "15:45 - 16:25", "options": [{ "subject": "None", "room": null }] }
                    ]}
                ]
            }
        };

        const NO_ATTENDANCE = "No Attendance";
        let isDarkMode = true;
        let selectedElectives = {};
        let fontSizeMultiplier = 1.0;

        // Font Size Logic
        const sizeSlider = document.getElementById('fontSizeSlider');
        sizeSlider.oninput = (e) => {
            fontSizeMultiplier = parseFloat(e.target.value);
            document.documentElement.style.fontSize = `${fontSizeMultiplier * 100}%`;
            renderElectives();
        };

        // 1. Theme Logic
        const themeBtn = document.getElementById('themeToggle');
        themeBtn.onclick = () => {
            isDarkMode = !isDarkMode;
            document.body.className = (isDarkMode ? 'dark-theme' : 'light-theme') + ' transition-theme min-h-screen';
            document.getElementById('navbar').className = `sticky top-0 z-50 glass border-b px-6 py-4 flex items-center justify-between transition-theme ${isDarkMode ? 'bg-black/60 border-white/5' : 'bg-white/60 border-slate-200'}`;
            document.getElementById('actionBar').className = `fixed bottom-10 left-6 right-6 flex flex-col gap-3.5 max-w-lg mx-auto p-4.5 rounded-[2.8rem] glass border shadow-2xl transition-theme ${isDarkMode ? 'bg-zinc-800/80 border-white/10' : 'bg-white/80 border-slate-200 shadow-slate-200/50'}`;
            document.getElementById('btnCalendar').className = `w-full h-15 font-bold rounded-2xl flex items-center justify-center gap-3 border transition-all active:scale-[0.98] transition-theme ${isDarkMode ? 'bg-white/5 border-white/10 hover:bg-white/10' : 'bg-slate-100 border-slate-200 hover:bg-slate-200'}`;
            document.getElementById('homeroomContainer').className = `relative p-1 rounded-2xl transition-theme ${isDarkMode ? 'bg-white/5 border border-white/10' : 'bg-white border border-slate-200 shadow-sm'}`;
            
            // Update Size Slider Container
            sizeSlider.parentElement.className = `flex items-center gap-2 px-3 py-1.5 rounded-full border transition-theme ${isDarkMode ? 'bg-white/5 border-white/10' : 'bg-slate-100 border-slate-200'}`;

            document.getElementById('sunIcon').classList.toggle('hidden', !isDarkMode);
            document.getElementById('moonIcon').classList.toggle('hidden', isDarkMode);
            renderElectives();
        };

        // 2. Data Initialization
        const getElectiveGroups = () => {
            const groups = new Map();
            TIMETABLE_DATA.timetable.schedule.forEach(day => {
                day.periods.forEach(p => {
                    if (p.options.length > 1) {
                        const key = p.options.map(o => o.subject).sort().join('|');
                        if (!groups.has(key)) {
                            groups.set(key, {
                                options: [...p.options.map(o => o.subject), NO_ATTENDANCE],
                                instances: []
                            });
                        }
                        groups.get(key).instances.push({ day: day.day, period: p.period });
                    }
                });
            });
            return Array.from(groups.entries()).map(([id, val]) => ({ id, ...val }));
        };

        // 3. Rendering
        const renderElectives = () => {
            const grid = document.getElementById('electivesGrid');
            const groups = getElectiveGroups();
            grid.innerHTML = '';

            groups.forEach(group => {
                const card = document.createElement('div');
                card.className = `p-8 rounded-[2.5rem] border transition-all ${isDarkMode ? 'bg-zinc-900/50 border-white/5' : 'bg-white border-slate-100 shadow-xl shadow-slate-200/40'}`;
                
                let instancesHtml = group.instances.map(inst => `
                    <span class="text-[10px] px-2.5 py-1 rounded-lg bg-indigo-500/10 text-indigo-400 font-mono font-bold">
                        ${inst.day.slice(0,3)} P${inst.period}
                    </span>
                `).join('');

                let optionsHtml = group.options.map(option => {
                    const isActive = selectedElectives[group.id] === option;
                    return `
                        <button onclick="handleSelect('${group.id}', '${option}')" class="group w-full py-4 px-6 rounded-2xl text-left transition-all flex items-center justify-between border-2 ${
                            isActive 
                            ? 'border-indigo-500 bg-indigo-500 text-white shadow-lg' 
                            : isDarkMode ? 'bg-white/5 border-transparent hover:border-white/20' : 'bg-slate-50 border-transparent hover:border-slate-200'
                        }">
                            <span class="font-bold ${option === NO_ATTENDANCE ? 'italic opacity-60 font-normal' : ''}" style="font-size: ${1 * fontSizeMultiplier}rem">${option}</span>
                            ${isActive ? '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>' : '<svg class="w-4 h-4 opacity-20 group-hover:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>'}
                        </button>
                    `;
                }).join('<div class="h-2.5"></div>');

                card.innerHTML = `
                    <p class="text-xs font-bold text-indigo-400 uppercase tracking-widest mb-3">Linked Time Slots</p>
                    <div class="flex flex-wrap gap-1.5 mb-6">${instancesHtml}</div>
                    <div>${optionsHtml}</div>
                `;
                grid.appendChild(card);
            });
        };

        window.handleSelect = (groupId, subject) => {
            selectedElectives[groupId] = subject;
            renderElectives();
        };

        // 4. Export Logic
        const getActivePeriodData = (options) => {
            if (options.length === 1) {
                const opt = options[0];
                return (opt.subject === "None" || opt.subject === "Lunch") ? null : opt;
            }
            const key = options.map(o => o.subject).sort().join('|');
            const selectedSubject = selectedElectives[key];
            if (selectedSubject === NO_ATTENDANCE || !selectedSubject) return null;
            return options.find(o => o.subject === selectedSubject);
        };

        document.getElementById('btnSaveImage').onclick = () => {
            const canvas = document.getElementById('exportCanvas');
            const ctx = canvas.getContext('2d');
            const width = 1290, height = 2796;
            canvas.width = width; canvas.height = height;

            ctx.fillStyle = isDarkMode ? '#000000' : '#FFFFFF';
            ctx.fillRect(0, 0, width, height);

            const startY = 720, margin = 80, colWidth = (width - (margin * 2)) / 5, rowHeight = 158;

            ctx.textAlign = 'center';
            ctx.fillStyle = isDarkMode ? '#FFFFFF' : '#4034af';
            ctx.font = `800 ${Math.round(96 * fontSizeMultiplier)}px Inter`;
            ctx.fillText('PERSONAL PLAN', width / 2, startY - 260);
            
            ctx.fillStyle = '#d9f99d'; // Mint
            ctx.font = `700 ${Math.round(38 * fontSizeMultiplier)}px Inter`;
            ctx.fillText(TIMETABLE_DATA.timetable.class.toUpperCase(), width / 2, startY - 180);

            const days = ['MON', 'TUE', 'WED', 'THU', 'FRI'];
            ctx.font = `700 ${Math.round(32 * fontSizeMultiplier)}px Inter`;
            ctx.fillStyle = isDarkMode ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)';
            days.forEach((day, i) => ctx.fillText(day, margin + (i * colWidth) + (colWidth / 2), startY - 60));

            TIMETABLE_DATA.timetable.schedule.forEach((dayData, dIdx) => {
                dayData.periods.forEach((p, pIdx) => {
                    const activeData = getActivePeriodData(p.options);
                    if (!activeData) return;

                    const x = margin + (dIdx * colWidth), y = startY + (pIdx * rowHeight);
                    ctx.fillStyle = isDarkMode ? '#141414' : '#f1f5f9';
                    if (activeData.subject.startsWith('IB')) ctx.fillStyle = isDarkMode ? 'rgba(64, 52, 175, 0.25)' : 'rgba(64, 52, 175, 0.05)';

                    ctx.beginPath();
                    ctx.roundRect(x + 8, y + 8, colWidth - 16, rowHeight - 16, 22);
                    ctx.fill();

                    ctx.fillStyle = isDarkMode ? '#FFFFFF' : '#000000';
                    ctx.font = `bold ${Math.round(24 * fontSizeMultiplier)}px Inter`;
                    const words = activeData.subject.split(' ');
                    if (words.length > 1 && activeData.subject.length > 8) {
                        ctx.fillText(words[0], x + (colWidth/2), y + 65);
                        ctx.fillText(words.slice(1).join(' '), x + (colWidth/2), y + 95);
                    } else {
                        ctx.fillText(activeData.subject, x + (colWidth/2), y + rowHeight / 2);
                    }

                    ctx.font = `600 ${Math.round(18 * fontSizeMultiplier)}px "IBM Plex Mono"`;
                    ctx.fillStyle = '#4034af';
                    ctx.fillText(p.time.split(' - ')[0], x + (colWidth/2), y + rowHeight - 38);
                });
            });

            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'EduPlus_Lockscreen.png';
            link.click();
        };

        document.getElementById('btnCalendar').onclick = () => {
            let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//EduPlus//EN\n";
            const now = new Date();
            const monday = new Date(now.setDate(now.getDate() + ((1 + 7 - now.getDay()) % 7 || 7)));
            const dayMap = { "Monday": 0, "Tuesday": 1, "Wednesday": 2, "Thursday": 3, "Friday": 4 };

            TIMETABLE_DATA.timetable.schedule.forEach(dayData => {
                const baseDate = new Date(monday);
                baseDate.setDate(baseDate.getDate() + dayMap[dayData.day]);
                const dateStr = baseDate.toISOString().split('T')[0].replace(/-/g, '');

                dayData.periods.forEach(p => {
                    const activeData = getActivePeriodData(p.options);
                    if (!activeData) return;
                    const [start, end] = p.time.split(' - ').map(t => t.split(':').map(x => x.padStart(2,'0')).join(''));

                    ics += "BEGIN:VEVENT\n";
                    ics += `SUMMARY:${activeData.subject}\n`;
                    ics += `DTSTART:${dateStr}T${start}00\n`;
                    ics += `DTEND:${dateStr}T${end}00\n`;
                    ics += `RRULE:FREQ=WEEKLY;BYDAY=${dayData.day.substring(0, 2).toUpperCase()}\n`;
                    ics += "END:VEVENT\n";
                });
            });
            ics += "END:VCALENDAR";
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([ics], { type: 'text/calendar' }));
            link.download = 'ManageIB_Schedule.ics';
            link.click();
        };

        // Init
        const hrSelect = document.getElementById('homeroomSelect');
        hrSelect.innerHTML = `<option>${TIMETABLE_DATA.timetable.class}</option>`;
        renderElectives();
    </script>
</body>
